<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Yaxin's Film Gallery</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{width:100%;height:100%;background:#f5f5f3;overflow:hidden}
#stage{width:100vw;height:100vh;background:#f5f5f3;overflow:hidden;position:relative;cursor:crosshair}
canvas{display:block;width:100%;height:100%}
#ui{position:absolute;inset:0;pointer-events:none}
.lbl{position:absolute;font-family:'Helvetica Neue',Helvetica,Arial,sans-serif;font-size:10px;letter-spacing:.18em;color:#aaa;font-weight:400;text-transform:uppercase}
#ll{top:26px;left:28px}
#lr{top:26px;right:28px}
#lb2{bottom:26px;left:28px}
#lr2{bottom:26px;right:28px}
#modes{position:absolute;top:18px;left:50%;transform:translateX(-50%);display:flex;gap:1px;pointer-events:all}
.mb{padding:7px 16px;border:0.5px solid #ddd;background:#f5f5f3;font-size:10px;font-family:'Helvetica Neue',Helvetica,Arial,sans-serif;color:#999;cursor:pointer;letter-spacing:.1em;text-transform:uppercase;transition:all .25s}
.mb:first-child{border-radius:2px 0 0 2px}
.mb:last-child{border-radius:0 2px 2px 0}
.mb.on{background:#111;color:#fff;border-color:#111}
#info{position:absolute;bottom:54px;left:50%;transform:translateX(-50%);text-align:center;pointer-events:none;opacity:0;transition:opacity .3s;white-space:nowrap}
#iname{font-family:'Helvetica Neue',Helvetica,Arial,sans-serif;font-size:11px;letter-spacing:.22em;color:#111;font-weight:400;text-transform:uppercase}
#imeta{font-family:'Helvetica Neue',Helvetica,Arial,sans-serif;font-size:10px;letter-spacing:.12em;color:#999;margin-top:5px}
#lightbox{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:space-between;pointer-events:none;opacity:0;transition:opacity .35s;z-index:50;background:rgba(245,245,243,0);padding:60px 24px 32px}
#lightbox.open{opacity:1;pointer-events:all;background:rgba(245,245,243,0.95)}
#lb-inner{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:16px;width:100%;min-height:0;position:relative}
#lb-img{max-width:min(260px,80vw);max-height:calc(100vh - 220px);width:auto;height:auto;border-radius:2px;object-fit:contain;display:block;background:#eee}
#lb-title{font-family:'Helvetica Neue',Helvetica,Arial,sans-serif;font-size:11px;letter-spacing:.22em;color:#111;text-transform:uppercase;text-align:center}
#lb-sub{font-family:'Helvetica Neue',Helvetica,Arial,sans-serif;font-size:10px;letter-spacing:.12em;color:#aaa;text-align:center;margin-top:4px}
#lb-close{position:absolute;top:0;right:0;width:32px;height:32px;background:none;border:0.5px solid #ddd;border-radius:50%;cursor:pointer;font-size:16px;color:#999;display:flex;align-items:center;justify-content:center;transition:all .2s;line-height:1}
#lb-close:hover{background:#111;color:#fff;border-color:#111}
#lb-nav{display:flex;gap:8px;flex-shrink:0;padding-bottom:8px}
.lb-arr{background:none;border:0.5px solid #ddd;padding:6px 14px;cursor:pointer;font-family:'Helvetica Neue',Helvetica,Arial,sans-serif;font-size:10px;letter-spacing:.1em;color:#999;text-transform:uppercase;border-radius:2px;transition:all .2s}
.lb-arr:hover{background:#111;color:#fff;border-color:#111}
@media (max-width:600px){
  #ll{top:18px;left:16px;font-size:9px}
  #lr{top:18px;right:16px;font-size:9px}
  #lb2{bottom:18px;left:16px;font-size:9px}
  #lr2{display:none}
  #modes{top:14px}
  .mb{padding:6px 12px;font-size:9px}
  #lightbox{padding:48px 16px 24px}
  #lb-img{max-width:90vw;max-height:calc(100vh - 200px)}
  #info{bottom:44px}
}
</style>
</head>
<body>
<div id="stage">
  <canvas id="c"></canvas>
  <div id="ui">
    <span class="lbl" id="ll">Yaxin's Film</span>
    <span class="lbl" id="lr">01 — 21</span>
    <span class="lbl" id="lb2">Drag to explore</span>
    <span class="lbl" id="lr2">Click to preview</span>
    <div id="modes">
      <button class="mb on" data-m="ring">Ring</button>
      <button class="mb" data-m="flat">Flat</button>
      <button class="mb" data-m="gallery">Gallery</button>
    </div>
    <div id="info"><div id="iname"></div><div id="imeta"></div></div>
  </div>
  <div id="lightbox">
    <div id="lb-inner">
      <button id="lb-close">&#215;</button>
      <img id="lb-img" src="" alt="">
      <div><div id="lb-title"></div><div id="lb-sub"></div></div>
    </div>
    <div id="lb-nav">
      <button class="lb-arr" id="lb-prev">&#8592; Prev</button>
      <button class="lb-arr" id="lb-next">Next &#8594;</button>
    </div>
  </div>
</div>
<script>
const ITEMS = [
  { src: 'images/000004210007.jpg',  label: 'No. 01', sub: 'Film' },
  { src: 'images/000004210023.jpg',  label: 'No. 02', sub: 'Film' },
  { src: 'images/000004560032.jpg',  label: 'No. 03', sub: 'Film' },
  { src: 'images/000015020002.jpg',  label: 'No. 04', sub: 'Film' },
  { src: 'images/000015020006.jpg',  label: 'No. 05', sub: 'Film' },
  { src: 'images/000015020018.jpg',  label: 'No. 06', sub: 'Film' },
  { src: 'images/000015020031.jpg',  label: 'No. 07', sub: 'Film' },
  { src: 'images/000030420024.jpg',  label: 'No. 08', sub: 'Film' },
  { src: 'images/000030420027-2.jpg',label: 'No. 09', sub: 'Film' },
  { src: 'images/000030420031.jpg',  label: 'No. 10', sub: 'Film' },
  { src: 'images/000041.JPG',        label: 'No. 11', sub: 'Film' },
  { src: 'images/000051330006.jpg',  label: 'No. 12', sub: 'Film' },
  { src: 'images/000051330028-2.jpg',label: 'No. 13', sub: 'Film' },
  { src: 'images/000082360002.jpg',  label: 'No. 14', sub: 'Film' },
  { src: 'images/000082360005.jpg',  label: 'No. 15', sub: 'Film' },
  { src: 'images/000082360008.jpg',  label: 'No. 16', sub: 'Film' },
  { src: 'images/000082360027.JPG',  label: 'No. 17', sub: 'Film' },
  { src: 'images/000086480028.jpg',  label: 'No. 18', sub: 'Film' },
  { src: 'images/000099110008.jpg',  label: 'No. 19', sub: 'Film' },
  { src: 'images/000099110013.jpg',  label: 'No. 20', sub: 'Film' },
  { src: 'images/000099110014.jpg',  label: 'No. 21', sub: 'Film' },
];

const N = ITEMS.length;
const isMobile = () => window.innerWidth <= 600;
let CW = 95, CH = 125;
function updateCardSize() {
  if (isMobile()) { CW = 52; CH = 68; }
  else            { CW = 95; CH = 125; }
}

const imgs = ITEMS.map(it => {
  const img = new Image();
  img.src = it.src;
  return img;
});

const stage   = document.getElementById('stage');
const cv      = document.getElementById('c');
const ctx     = cv.getContext('2d');
const infoEl  = document.getElementById('info');
const inameEl = document.getElementById('iname');
const imetaEl = document.getElementById('imeta');
const cntEl   = document.getElementById('lr');
const lbEl    = document.getElementById('lightbox');
const lbImg   = document.getElementById('lb-img');
const lbTitle = document.getElementById('lb-title');
const lbSub   = document.getElementById('lb-sub');

let W, H, dpr;
function resize() {
  dpr = devicePixelRatio || 1;
  W = stage.offsetWidth; H = stage.offsetHeight;
  cv.width = W * dpr; cv.height = H * dpr;
  ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
}
updateCardSize();
resize();
window.addEventListener('resize', () => { updateCardSize(); resize(); });

let mode = 'ring', spin = 0, spinning = true;
let mx = W/2, my = H/2, mInside = false;
let drag = null, dragMoved = false;
let hovIdx = -1, lbOpen = false, lbIdx = 0;
let targetTilt = 0, currentTilt = 0;
let gOff = 0, gTarget = 0;
const PUSH_R = 130, PUSH_S = 75, PUSH_D = 48;

const cards = Array.from({length: N}, () => ({x: W/2, y: H/2, z: 0, sc: 0.01, op: 0, hov: 0}));

function lerp(a, b, t) { return a + (b - a) * t; }

function getBase() {
  const cx = W/2, cy = H/2;
  if (mode === 'ring') {
    const rx = Math.min(W,H) * (isMobile() ? 0.36 : 0.46);
    const ry = rx * 0.28;
    const tilt = currentTilt;
    return ITEMS.map((_, i) => {
      const a = (i/N) * Math.PI*2 + spin;
      const ex = Math.cos(a) * rx;
      const ey = Math.sin(a) * ry;
      const x = cx + ex * Math.cos(tilt) - ey * Math.sin(tilt);
      const y = cy + ex * Math.sin(tilt) + ey * Math.cos(tilt);
      const z = Math.sin(a);
      return { x, y, z, sc: 0.55 + 0.5*((z+1)/2) };
    });
  }
  if (mode === 'flat') {
    const cols = isMobile() ? 3 : 4;
    const rows = Math.ceil(N/cols);
    return ITEMS.map((_, i) => ({
      x: W * (i%cols + 1)/(cols+1),
      y: H * (Math.floor(i/cols) + 1)/(rows+1),
      z: 0, sc: 0.85
    }));
  }
  if (mode === 'gallery') {
    const PERSP = 500;
    const SLOT = isMobile() ? 180 : 320;
    return ITEMS.map((_, i) => {
      let s = i - gOff;
      while (s < -N/2) s += N;
      while (s >= N/2) s -= N;
      const abs = Math.abs(s);
      const depth = abs * 260;
      const sc = PERSP / (PERSP + depth);
      const x = cx + s * SLOT * (PERSP / (PERSP + Math.max(0, abs - 0.5) * 260));
      const y = cy;
      return { x, y, z: -abs, sc: sc * 2 };
    });
  }
  return [];
}

function openLb(idx) {
  lbIdx = idx; lbOpen = true; spinning = false;
  lbImg.src       = ITEMS[idx].src;
  lbTitle.textContent = ITEMS[idx].label;
  lbSub.textContent   = ITEMS[idx].sub;
  cntEl.textContent   = String(idx+1).padStart(2,'0') + ' — ' + String(N).padStart(2,'0');
  lbEl.classList.add('open');
}
function closeLb() {
  lbOpen = false; lbEl.classList.remove('open');
  if (mode === 'ring') spinning = true;
}
function navLb(d) {
  lbIdx = (lbIdx + d + N) % N;
  lbImg.src           = ITEMS[lbIdx].src;
  lbTitle.textContent = ITEMS[lbIdx].label;
  lbSub.textContent   = ITEMS[lbIdx].sub;
  cntEl.textContent   = String(lbIdx+1).padStart(2,'0') + ' — ' + String(N).padStart(2,'0');
}

document.getElementById('lb-close').onclick = closeLb;
document.getElementById('lb-prev').onclick   = () => navLb(-1);
document.getElementById('lb-next').onclick   = () => navLb(1);
lbEl.addEventListener('click', e => { if (e.target === lbEl) closeLb(); });
window.addEventListener('keydown', e => {
  if (!lbOpen) return;
  if (e.key === 'ArrowLeft')  navLb(-1);
  if (e.key === 'ArrowRight') navLb(1);
  if (e.key === 'Escape')     closeLb();
});

function hitTest(px, py) {
  const sorted = [...cards.map((c,i) => ({...c,i}))].sort((a,b) => b.z - a.z);
  for (const {x, y, sc, i} of sorted) {
    if (Math.abs(px-x) < CW*sc*0.6 && Math.abs(py-y) < CH*sc*0.6) return i;
  }
  return -1;
}

function draw() {
  ctx.clearRect(0,0,W,H);
  ctx.fillStyle = '#f5f5f3'; ctx.fillRect(0,0,W,H);

  if (mode === 'ring' && spinning && !drag) spin += 0.0035;
  if (mode === 'ring') currentTilt = lerp(currentTilt, targetTilt, 0.12);
  if (mode === 'gallery') gOff = lerp(gOff, gTarget, 0.018);

  const base = getBase();
  for (let i = 0; i < N; i++) {
    const b = base[i], c = cards[i];
    let tx = b.x, ty = b.y;
    if (mInside && mode === 'ring' && !lbOpen) {
      const dx = b.x - mx, dy = b.y - my;
      const dist = Math.sqrt(dx*dx + dy*dy);
      if (dist > PUSH_D && dist < PUSH_R) {
        const f = Math.pow((PUSH_R - dist)/PUSH_R, 1.8) * PUSH_S;
        tx += dx/dist * f; ty += dy/dist * f;
      }
    }
    c.x  = lerp(c.x,  tx,   0.07);
    c.y  = lerp(c.y,  ty,   0.07);
    c.z  = lerp(c.z,  b.z,  0.07);
    c.sc = lerp(c.sc, b.sc, 0.07);
    c.op = lerp(c.op, 1,    0.06);
    c.hov= lerp(c.hov, hovIdx === i ? 1 : 0, 0.10);
  }

  const drawOrder = [...cards.map((c,i) => ({...c,i}))].sort((a,b) => a.z - b.z);
  drawOrder.forEach(({x, y, z, sc, op, hov, i}) => {
    const isH = hovIdx === i && !lbOpen;
    const fs  = sc * (1 + hov * 0.08);
    let alpha;
    if (mode === 'gallery') {
      alpha = op * Math.max(0.08, 1 - (-z) * 0.35);
    } else {
      alpha = op * (0.35 + (z+1)/2 * 0.65 + (isH ? 0.15 : 0));
    }
    if (alpha < 0.02) return;

    const hw = CW/2, hh = CH/2;
    ctx.save();
    ctx.globalAlpha = Math.min(1, alpha);
    ctx.translate(x, y); ctx.scale(fs, fs);
    ctx.beginPath(); ctx.roundRect(-hw, -hh, CW, CH, 2); ctx.clip();
    const img = imgs[i];
    if (img.complete && img.naturalWidth > 0) {
      const ir = img.naturalWidth / img.naturalHeight;
      const cr = CW / CH;
      let sx, sy, sw, sh;
      if (ir > cr) { sh = img.naturalHeight; sw = sh * cr; sx = (img.naturalWidth - sw) / 2; sy = 0; }
      else         { sw = img.naturalWidth;  sh = sw / cr; sy = (img.naturalHeight - sh) / 2; sx = 0; }
      ctx.drawImage(img, sx, sy, sw, sh, -hw, -hh, CW, CH);
    } else {
      ctx.fillStyle = '#e0e0e0'; ctx.fillRect(-hw, -hh, CW, CH);
    }
    if (isH) { ctx.fillStyle = 'rgba(255,255,255,0.1)'; ctx.fillRect(-hw,-hh,CW,CH); }
    ctx.restore();

    if (isH) stage.style.cursor = 'pointer';
  });

  if (hovIdx === -1 && !lbOpen) stage.style.cursor = mode === 'gallery' ? 'ew-resize' : 'crosshair';
  requestAnimationFrame(draw);
}

stage.addEventListener('mousemove', e => {
  if (lbOpen) return;
  const r = stage.getBoundingClientRect();
  mx = e.clientX - r.left; my = e.clientY - r.top; mInside = true;
  if (mode === 'ring') {
    // map mouse X: left edge = -0.6, center = 0, right edge = +0.6
    const t = mx / W; // 0 to 1
    targetTilt = (t - 0.5) * 1.2;
  }
  if (drag) {
    const dx = mx - drag.sx;
    if (Math.abs(dx) > 3) dragMoved = true;
    if (mode === 'ring')    spin    = drag.baseSpin + dx * 0.006;
    if (mode === 'gallery') gTarget = drag.baseOff - dx * 0.004;
    return;
  }
  const h = hitTest(mx, my);
  if (h !== hovIdx) {
    hovIdx = h;
    if (h >= 0) {
      inameEl.textContent  = ITEMS[h].label;
      imetaEl.textContent  = ITEMS[h].sub;
      infoEl.style.opacity = '1';
      cntEl.textContent    = String(h+1).padStart(2,'0') + ' — ' + String(N).padStart(2,'0');
    } else {
      infoEl.style.opacity = '0';
      cntEl.textContent    = '01 — ' + String(N).padStart(2,'0');
    }
  }
});
stage.addEventListener('mouseenter', () => { mInside = true; });
stage.addEventListener('mouseleave', () => {
  if (lbOpen) return;
  mInside = false; hovIdx = -1; infoEl.style.opacity = '0'; drag = null;
  stage.style.cursor = 'crosshair';
});
stage.addEventListener('mousedown', e => {
  if (lbOpen) return;
  const r = stage.getBoundingClientRect();
  drag = { sx: e.clientX - r.left, baseSpin: spin, baseOff: gTarget };
  dragMoved = false;
  if (mode === 'ring') spinning = false;
});
stage.addEventListener('mouseup', e => {
  if (lbOpen) return;
  const r  = stage.getBoundingClientRect();
  const px = e.clientX - r.left, py = e.clientY - r.top;
  if (!dragMoved) {
    const h = hitTest(px, py);
    if (h >= 0) openLb(h);
    else if (mode === 'ring') spinning = !spinning;
  } else if (mode === 'gallery') {
    gTarget = Math.round(gTarget);
  }
  drag = null; dragMoved = false;
});
stage.addEventListener('wheel', e => {
  if (lbOpen) return; e.preventDefault();
  if (mode === 'ring')    spin    += e.deltaY * 0.001;
  if (mode === 'gallery') gTarget += e.deltaY * 0.003;
}, { passive: false });

document.querySelectorAll('.mb').forEach(b => {
  b.addEventListener('click', e => {
    e.stopPropagation();
    mode = b.dataset.m;
    document.querySelectorAll('.mb').forEach(x => x.classList.remove('on'));
    b.classList.add('on');
    spinning = (mode === 'ring');
    if (mode === 'gallery') { gOff = 0; gTarget = 0; }
  });
});

// ── Touch support ──────────────────────────────────────────
function getTouchPos(e) {
  const r = stage.getBoundingClientRect();
  const t = e.touches[0] || e.changedTouches[0];
  return { x: t.clientX - r.left, y: t.clientY - r.top };
}

stage.addEventListener('touchstart', e => {
  if (lbOpen) return;
  const {x, y} = getTouchPos(e);
  drag = { sx: x, sy: y, baseSpin: spin, baseOff: gTarget };
  dragMoved = false;
  if (mode === 'ring') spinning = false;
  // update tilt target on touch
  targetTilt = (x / W - 0.5) * 1.2;
}, { passive: true });

stage.addEventListener('touchmove', e => {
  if (lbOpen) return;
  e.preventDefault();
  const {x, y} = getTouchPos(e);
  if (!drag) return;
  const dx = x - drag.sx;
  const dy = y - drag.sy;
  if (Math.abs(dx) > 4 || Math.abs(dy) > 4) dragMoved = true;
  if (mode === 'ring') {
    spin = drag.baseSpin + dx * 0.006;
    targetTilt = (x / W - 0.5) * 1.2;
  }
  if (mode === 'gallery') {
    gTarget = drag.baseOff - dx * 0.006;
    gOff = gTarget;
  }
}, { passive: false });

stage.addEventListener('touchend', e => {
  if (lbOpen) return;
  const {x, y} = getTouchPos(e);
  if (!dragMoved) {
    const h = hitTest(x, y);
    if (h >= 0) openLb(h);
    else if (mode === 'ring') spinning = !spinning;
  } else if (mode === 'gallery') {
    gTarget = Math.round(gTarget);
  } else if (mode === 'ring') {
    spinning = false;
  }
  drag = null; dragMoved = false;
}, { passive: true });

draw();
</script>
</body>
</html>
